# https://www.nerdfonts.com/cheat-sheet

format = """\
    $username\
    $hostname\
    $directory\
    $package\
    $java\
    $nodejs\
    $ruby\
    $git_branch\
    $git_commit\
    $git_state\
    $git_status\
    $rust\
    $terraform\
    $nix_shell\
    $conda\
    $memory_usage\
    $aws\
    $env_var\
    $crystal\
    $cmd_duration\
    $line_break\
    $jobs\
    $battery\
    $time\
    $character\
"""

[character]
# symbol = "λ"
# symbol = "" # lightning symbol
# symbol = "" # flask symbol
success_symbol = "(bold green)" # chilli symbol
error_symbol = "(bold red)"
# symbol = "" # serynge symbol

[nodejs]
symbol = " "

[git_branch]
symbol = " "


[battery]
charging_symbol = " "

[[battery.display]]
threshold = 20
style = "bold red"